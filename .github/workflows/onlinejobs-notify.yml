# OnlineJobs.ph → Telegram
# Polls latest jobs and notifies on NEW postings only.
#
# Secrets:
#   TELEGRAM_BOT_TOKEN (required)
#   TELEGRAM_CHAT_ID   (required)
#   KEYWORDS (optional) — empty = ALL latest jobs; e.g. "virtual assistant,VA"
#
# Note: schedule cron is UTC. GitHub may delay free-tier crons by several minutes.
# Use "Run workflow" anytime for an immediate poll.

name: OnlineJobs Telegram Notify

on:
  schedule:
    # Every 10 minutes (UTC)
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      open_detail:
        description: "Open each job page for Date Updated (slower)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  actions: write

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Immutable cache keys: always restore latest, always save a new entry
      - name: Restore seen-job state
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: state
          key: onlinejobs-seen-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            onlinejobs-seen-

      - name: Poll once and notify Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          KEYWORDS: ${{ secrets.KEYWORDS }}
          PAGES_PER_KEYWORD: "1"
          REQUEST_DELAY_SECONDS: "2"
          # Listing page already has title/salary/skills/link — skip slow detail fetch by default
          OPEN_DETAIL_PAGES: ${{ github.event.inputs.open_detail || 'false' }}
          SEND_ON_FIRST_RUN: "false"
          STATE_FILE: state/seen_jobs.json
        run: |
          mkdir -p state
          echo "=== Poll start $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="
          echo "KEYWORDS length: ${#KEYWORDS} (empty = all jobs)"
          if [ -f state/seen_jobs.json ]; then
            echo "Seen state file size: $(wc -c < state/seen_jobs.json) bytes"
          else
            echo "No seen state yet (first poll will seed)"
          fi
          python notify.py --once
          echo "=== Poll end $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="

      - name: Save seen-job state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state
          key: onlinejobs-seen-${{ github.run_id }}-${{ github.run_attempt }}
