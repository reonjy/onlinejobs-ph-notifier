# Free always-on alternative to Hugging Face Spaces:
# runs a single poll every 15 minutes and exits.
#
# Setup:
#  1. Push this repo to GitHub
#  2. Repo → Settings → Secrets and variables → Actions
#     Add: TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
#     Optional: KEYWORDS, PAGES_PER_KEYWORD, REQUEST_DELAY_SECONDS
#  3. Enable Actions if prompted
#
# Note: GitHub caches are ephemeral; we store seen IDs as a workflow artifact
# and restore them each run so you don't get repeat notifications.

name: OnlineJobs Telegram Notify

on:
  schedule:
    # Every 15 minutes
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read
  # artifact upload/download uses default GITHUB_TOKEN

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore seen-job state
        uses: actions/cache@v4
        with:
          path: state
          key: onlinejobs-seen-${{ github.run_id }}
          restore-keys: |
            onlinejobs-seen-

      - name: Poll once and notify Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Empty KEYWORDS = watch ALL new jobs (no filter).
          # Set secret e.g. virtual assistant,VA,Data Entry to filter.
          KEYWORDS: ${{ secrets.KEYWORDS }}
          PAGES_PER_KEYWORD: "1"
          REQUEST_DELAY_SECONDS: "3"
          OPEN_DETAIL_PAGES: "true"
          SEND_ON_FIRST_RUN: "false"
          STATE_FILE: state/seen_jobs.json
        run: |
          mkdir -p state
          # Keep KEYWORDS set even if empty so notify.py treats empty as "all jobs"
          echo "KEYWORDS length: ${#KEYWORDS}"
          python notify.py --once

      - name: Keep state cache warm
        if: always()
        run: |
          mkdir -p state
          test -f state/seen_jobs.json || echo '{"seen_ids":[]}' > state/seen_jobs.json
          ls -la state
