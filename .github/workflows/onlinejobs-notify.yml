# OnlineJobs.ph → Telegram
# Polls latest jobs and notifies on NEW postings only.
#
# Secrets:
#   TELEGRAM_BOT_TOKEN (required)
#   TELEGRAM_CHAT_ID   (required)
#   KEYWORDS (optional) — empty = ALL latest jobs; e.g. "virtual assistant,VA"
#
# IMPORTANT: GitHub schedule is best-effort (can delay or skip free-tier crons).
# Cron is offset from :00 to reduce drops during peak load.
# Use "Run workflow" anytime for an immediate poll.
# State is saved to branch "state" (durable) + Actions cache (fast restore).

name: OnlineJobs Telegram Notify

on:
  schedule:
    # Every 15 minutes, offset from the hour (UTC) — more reliable than */15
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:
    inputs:
      open_detail:
        description: "Open each job page for Date Updated (slower)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  actions: write

concurrency:
  group: onlinejobs-notify
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore seen-job state (cache)
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: state
          key: onlinejobs-seen-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            onlinejobs-seen-

      - name: Restore seen-job state (git branch)
        run: |
          mkdir -p state
          git fetch origin state:refs/remotes/origin/state 2>/dev/null || true
          if git show origin/state:seen_jobs.json > /tmp/seen_from_branch.json 2>/dev/null; then
            # Prefer branch state if it has more IDs than cache (or cache empty)
            BRANCH_COUNT=$(python -c "import json; d=json.load(open('/tmp/seen_from_branch.json')); print(len(d.get('seen_ids',[])))")
            CACHE_COUNT=0
            if [ -f state/seen_jobs.json ]; then
              CACHE_COUNT=$(python -c "import json; d=json.load(open('state/seen_jobs.json')); print(len(d.get('seen_ids',[])))")
            fi
            echo "Branch seen IDs: $BRANCH_COUNT | Cache seen IDs: $CACHE_COUNT"
            if [ "$BRANCH_COUNT" -ge "$CACHE_COUNT" ]; then
              cp /tmp/seen_from_branch.json state/seen_jobs.json
              echo "Using state branch copy"
            else
              echo "Keeping cache copy (more IDs)"
            fi
          else
            echo "No state branch yet (will create after poll)"
          fi

      - name: Poll once and notify Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          KEYWORDS: ${{ secrets.KEYWORDS }}
          PAGES_PER_KEYWORD: "1"
          REQUEST_DELAY_SECONDS: "2"
          OPEN_DETAIL_PAGES: ${{ github.event.inputs.open_detail || 'false' }}
          SEND_ON_FIRST_RUN: "false"
          STATE_FILE: state/seen_jobs.json
        run: |
          mkdir -p state
          echo "=== Poll start $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="
          echo "Event: ${{ github.event_name }}"
          echo "KEYWORDS length: ${#KEYWORDS} (empty = all jobs)"
          if [ -f state/seen_jobs.json ]; then
            echo "Seen state file size: $(wc -c < state/seen_jobs.json) bytes"
          else
            echo "No seen state yet (first poll will seed)"
          fi
          python notify.py --once
          echo "=== Poll end $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="

      - name: Save seen-job state (cache)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state
          key: onlinejobs-seen-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Persist seen-job state (git branch)
        if: always()
        run: |
          if [ ! -f state/seen_jobs.json ]; then
            echo "No state file to persist"
            exit 0
          fi
          # Work in a throwaway worktree on the state branch
          WORK=/tmp/oj-state
          rm -rf "$WORK"
          if git fetch origin state:refs/remotes/origin/state 2>/dev/null; then
            git worktree add -B state "$WORK" origin/state
          else
            git worktree add --detach "$WORK"
            git -C "$WORK" checkout --orphan state
            git -C "$WORK" rm -rf . 2>/dev/null || true
          fi
          cp state/seen_jobs.json "$WORK/seen_jobs.json"
          git -C "$WORK" config user.name "github-actions[bot]"
          git -C "$WORK" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$WORK" add seen_jobs.json
          if git -C "$WORK" diff --cached --quiet; then
            echo "State unchanged — skip commit"
          else
            git -C "$WORK" commit -m "chore: update seen job IDs ($(date -u +%Y-%m-%dT%H:%MZ))"
            git -C "$WORK" push origin state
            echo "Pushed state branch"
          fi
